name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Версия для имени архива (например 1.2.0)'
        required: false
        default: 'dev'

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "value=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ inputs.version || 'dev' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        run: >
          dotnet publish GameHelper.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o out

      - name: Copy data files
        shell: bash
        run: |
          cp affix_library.json        out/
          cp rune_affix_overrides.json out/
          cp affix_stats.json          out/
          cp catalyst_reforge_stats.json out/
          cp poe_ninja_prices.json     out/
          cp -r img                    out/img

      - name: Zip
        run: Compress-Archive -Path out\* -DestinationPath "GameHelper-${{ steps.ver.outputs.value }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHelper-${{ steps.ver.outputs.value }}
          path: GameHelper-${{ steps.ver.outputs.value }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: GameHelper-${{ steps.ver.outputs.value }}.zip
          generate_release_notes: true
